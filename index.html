<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Idade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .campo {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background-color: #e9ecef;
            text-align: center;
            font-size: 17px;
        }
        .erro {
            color: #dc3545;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Cálculo de Idade</h2>

        <div class="campo">
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" placeholder="Digite seu nome completo">
        </div>

        <div class="campo">
            <label for="anoNascimento">Ano de nascimento (1922 a 2021):</label>
            <input type="text" id="anoNascimento" placeholder="Ex: 1995">
        </div>

        <button onclick="calcularIdade()">Calcular</button>

        <div id="mensagemErro" class="erro"></div>
        <div id="resultado" class="resultado" style="display: none;"></div>
    </div>

    <script>
        function calcularIdade() {
            // Obtém os valores digitados
            const nome = document.getElementById('nome').value.trim();
            const anoInput = document.getElementById('anoNascimento').value.trim();
            const anoAtual = 2022; // Conforme definido no enunciado

            // Limpa mensagens anteriores
            document.getElementById('mensagemErro').textContent = "";
            document.getElementById('resultado').style.display = "none";

            // Valida o nome
            if (nome === "") {
                document.getElementById('mensagemErro').textContent = "Por favor, digite seu nome completo.";
                return;
            }

            // Valida o ano de nascimento
            let anoNascimento;
            try {
                anoNascimento = parseInt(anoInput);

                // Verifica se é número válido e está no intervalo
                if (isNaN(anoNascimento) || anoNascimento < 1922 || anoNascimento > 2021) {
                    throw new Error("Ano inválido! Digite um valor entre 1922 e 2021.");
                }
            } catch (erro) {
                document.getElementById('mensagemErro').textContent = erro.message;
                return;
            }

            // Calcula a idade
            const idade = anoAtual - anoNascimento;

            // Exibe o resultado
            document.getElementById('resultado').style.display = "block";
            document.getElementById('resultado').innerHTML = `
                <strong>Nome:</strong> ${nome}<br>
                No ano de ${anoAtual} você completou ou completará <strong>${idade} anos</strong>.
            `;
        }
    </script>
</body>
</html>
